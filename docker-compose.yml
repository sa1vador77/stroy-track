services:
  postgres:
    image: postgres:17-alpine
    # контейнеру БД передаются только его переменные:
    # env_file протащил бы туда и SECRET_KEY приложения
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    # миграции накатываются до старта API; реплика одна — гонок за DDL нет
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    # фото читает дашборд, пишет только бот — у API том read-only
    volumes:
      - uploads:/srv/stroytrack/uploads:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  bot:
    build: .
    env_file:
      - .env
      # токен — только боту: из общего .env он утёк бы и в API-контейнер;
      # без файла бот стартует и сам объясняет, что не хватает токена
      - path: .env.bot
        required: false
    environment:
      POSTGRES_HOST: postgres
    command: python -m app.bot
    # тихая смерть фонового воркера незаметна пользователям — поднимаем сами
    restart: unless-stopped
    # фото отчётов переживают пересоздание контейнера
    volumes:
      - uploads:/srv/stroytrack/uploads
    # ждёт app, а не только postgres: миграции накатывает процесс API
    depends_on:
      app:
        condition: service_healthy

  scheduler:
    build: .
    env_file:
      - .env
      # напоминания уходят от имени бота — токен нужен и этому процессу
      - path: .env.bot
        required: false
    environment:
      POSTGRES_HOST: postgres
    command: python -m app.scheduler
    restart: unless-stopped
    # ровно одна реплика: MemoryJobStore без распределённого лока —
    # вторая копия слала бы каждое напоминание дважды
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
  uploads:
