name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: stroytrack
          POSTGRES_PASSWORD: stroytrack
          POSTGRES_DB: stroytrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stroytrack -d stroytrack"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen
      # накатываем миграции и проверяем, что модели не разъехались со схемой
      - run: uv run alembic upgrade head
      - run: uv run alembic check
      - run: uv run pytest
